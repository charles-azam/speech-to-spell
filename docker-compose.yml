services:
  backend:
    build: .
    env_file: .env
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
